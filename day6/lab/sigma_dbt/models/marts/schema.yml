version: 2

models:
  - name: mart_merchant_performance
    description: "Aggregate merchant KPIs including total revenue, total transactions, failed count, failure rate, average transaction value, and unique customers."
    columns:
      - name: merchant_id
        description: "Unique identifier for the merchant."
        tests:
          - not_null
          - unique
      - name: merchant_name
        description: "Name of the merchant."
        tests:
          - not_null
      - name: category
        description: "Category of the merchant."
      - name: city
        description: "City where the merchant is located."
      - name: total_revenue
        description: "Total revenue generated by the merchant from completed transactions."
      - name: total_transactions
        description: "Total number of completed transactions by the merchant."
      - name: failed_count
        description: "Total number of failed transactions by the merchant."
      - name: total_attempts
        description: "Total number of transaction attempts by the merchant."
      - name: failure_rate_pct
        description: "Failure rate percentage of transactions by the merchant."
      - name: avg_transaction_value
        description: "Average transaction value for completed transactions by the merchant."
      - name: unique_customers
        description: "Number of unique customers who made completed transactions with the merchant."
