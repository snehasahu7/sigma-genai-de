version: 2

mart_fact_transactions:
  description: "Mart for transaction data with aggregated metrics"
  columns:
    - name: transaction_id
      description: "Unique identifier for each transaction"
      tests:
        - not_null
    - name: amount
      description: "Amount of the transaction in USD"
      tests:
        - not_null
    - name: status
      description: "Status of the transaction (COMPLETED, FAILED, PENDING)"
      tests:
        - not_null
        - accepted_values:
            values: ['COMPLETED', 'FAILED', 'PENDING']
        - accepted_values:
            values: ['CANCELLED']
            fail_calc: true
    - name: merchant_id
      description: "Foreign key referencing dim_merchant"
      tests:
        - not_null
        - relationships:
            to: ref('dim_merchant')
            field: merchant_id
    - name: customer_id
      description: "Foreign key referencing dim_customer"
      tests:
        - not_null
        - relationships:
            to: ref('dim_customer')
            field: customer_id
    - name: transaction_date
      description: "Date of the transaction"
      tests:
        - not_null
    - name: payment_method
      description: "Payment method used (CREDIT_CARD, DEBIT_CARD, UPI)"
      tests:
        - not_null
    - name: total_revenue
      description: "Total revenue from completed transactions"
      tests:
        - not_null
        - generic_test:
            calculator: "{{ value }} >= 0"
    - name: failure_rate_pct
      description: "Failure rate of transactions"
      tests:
        - not_null
        - generic_test:
            calculator: "{{ value }} BETWEEN 0 AND 100"
