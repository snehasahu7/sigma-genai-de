version: 2

sources:
  - name: sigma_analytics
    database: SIGMA_DE
    schema: PUBLIC
    tables:
      - name: fact_transactions
      - name: dim_merchant
      - name: dim_customer

models:
  - name: stg_transactions
    description: "Clean fact_transactions: rename to snake_case, cast types, filter out test data"
    columns:
      - name: transaction_id
        description: "Unique identifier for each transaction"
        tests:
          - not_null
          - unique
      - name: amount
        description: "Amount of the transaction in USD"
      - name: status
        description: "Status of the transaction (COMPLETED, FAILED, PENDING)"
        tests:
          - accepted_values:
              values: ['COMPLETED', 'FAILED', 'PENDING']
      - name: merchant_id
        description: "Foreign key referencing dim_merchant"
      - name: customer_id
        description: "Foreign key referencing dim_customer"
      - name: transaction_date
        description: "Date of the transaction"
      - name: payment_method
        description: "Payment method used (CREDIT_CARD, DEBIT_CARD, UPI)"
        tests:
          - accepted_values:
              values: ['CREDIT_CARD', 'DEBIT_CARD', 'UPI']
